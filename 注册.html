<!DOCTYPE html>
<html lang="zh-MY">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Be U by Bank Islam - 专属推荐奖励</title>
    <style>
        :root { --primary-color: #004a99; --accent-color: #00d2ff; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 2.5rem 1.5rem; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.15); text-align: center; width: 85%; max-width: 380px; position: relative; overflow: hidden; }
        .container::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 8px; background: linear-gradient(90deg, var(--primary-color), var(--accent-color)); }
        .logo-area { font-size: 2.5rem; font-weight: 900; color: var(--primary-color); margin-bottom: 0.5rem; letter-spacing: -1px; }
        h1 { font-size: 1.4rem; color: #333; margin-bottom: 0.5rem; }
        .bonus-text { color: #e74c3c; font-weight: bold; font-size: 1.1rem; margin-bottom: 1.5rem; }
        .promo-card { background: #f8faff; border: 2px dashed #004a99; padding: 1.2rem; border-radius: 16px; margin-bottom: 2rem; }
        .promo-label { font-size: 0.75rem; color: #777; text-transform: uppercase; margin-bottom: 5px; }
        .promo-code { font-size: 1.8rem; font-weight: 800; color: var(--primary-color); letter-spacing: 3px; }
        .cta-button { background: var(--primary-color); color: white; border: none; padding: 16px; border-radius: 12px; font-size: 1.1rem; font-weight: bold; width: 100%; cursor: pointer; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); box-shadow: 0 4px 15px rgba(0,74,153,0.3); }
        .cta-button:active { transform: scale(0.95); }
        .footer-note { margin-top: 1.5rem; font-size: 0.85rem; color: #888; line-height: 1.5; }
        .toast { visibility: hidden; min-width: 200px; background-color: #333; color: #fff; text-align: center; border-radius: 8px; padding: 12px; position: fixed; z-index: 1; bottom: 30px; font-size: 14px; }
        .toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-area">Be U</div>
    <h1>Bank Islam 官方奖励</h1>
    <p class="bonus-text">🎁 注册即领现金红利</p>
    
    <div class="promo-card">
        <div class="promo-label">点击下方按钮自动复制推荐码</div>
        <div class="promo-code" id="referralCode">SK168486</div>
    </div>

    <button class="cta-button" onclick="handleRedemption()">复制并下载 App</button>

    <div class="footer-note">
        💡 提示：在注册页面 <b>"Referral Code"</b> 处粘贴此代码即可激活奖励。
    </div>
</div>

<div id="toast" class="toast">代码已复制！正在为您跳转...</div>

<script>
    function handleRedemption() {
        const code = document.getElementById('referralCode').innerText;
        const toast = document.getElementById("toast");

        // 执行复制
        const textArea = document.createElement("textarea");
        textArea.value = code;
        document.body.appendChild(textArea);
        textArea.select();
        try {
            document.execCommand('copy');
            toast.className = "toast show";
        } catch (err) {
            console.error('无法复制', err);
        }
        document.body.removeChild(textArea);

        // 延迟跳转
        setTimeout(function() {
            const userAgent = navigator.userAgent || navigator.vendor || window.opera;
            
            // 优先跳转你提供的 Apple Store 链接
            if (/iPad|iPhone|iPod/.test(userAgent) && !window.MSStream) {
                window.location.href = "https://apps.apple.com/my/app/be-u-by-bank-islam/id1604306049";
            } else {
                // 安卓用户跳转 Google Play
                window.location.href = "https://play.google.com/store/apps/details?id=com.bankislam.beu";
            }
        }, 1500);
    }
</script>

</body>
</html>
